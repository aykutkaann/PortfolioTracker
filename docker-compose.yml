services:
    postgres:
        image: postgres:16
        container_name: portfolio-postgres
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: portfolio_db
        volumes: 
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
            

    
    redis:
        image: redis:7-alpine
        container_name: portfolio-redis
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5
    
    rabbitmq:
        image: rabbitmq:3-management
        container_name: portfolio-rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "check_running"]
            interval: 10s
            timeout: 10s
            retries: 5
    
    api:
        build:
            context: .
            dockerfile: src/PortfolioTracker.Api/Dockerfile
        container_name: portfolio-api
        ports:
            - "5000:8080"
        environment:
                    - ASPNETCORE_ENVIRONMENT=Development
                    - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=portfolio_db;Username=postgres;Password=admin
                    - ConnectionStrings__Redis=redis:6379
                    - JwtSettings__Key=YourSuperSecretKeyThatIsAtLeast32CharactersLong!
                    - JwtSettings__Issuer=PortfolioTracker
                    - JwtSettings__Audience=PortfolioTracker
                    - RabbitMq__Host=rabbitmq
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    worker:
        build:
            context: .
            dockerfile: src/PortfolioTracker.Worker/Dockerfile
        container_name: portfolio-worker
        environment:
                - DOTNET_ENVIRONMENT=Development
                - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=portfolio_db;Username=postgres;Password=admin
                - ConnectionStrings__Redis=redis:6379
                - RabbitMq__Host=rabbitmq
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy




volumes:
  postgres_data:
            



        
            
